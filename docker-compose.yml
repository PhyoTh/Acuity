# Local development infrastructure for Acuity.
# Prod uses Supabase (Postgres + Auth) and Render (services) instead.
#
#   docker compose up -d      # start Postgres + Redis
#   docker compose down       # stop (keeps the named volume / data)
#   docker compose down -v    # stop and wipe data
#
# Point backend/.env at these:
#   DATABASE_URL=postgresql+asyncpg://acuity:acuity@localhost:5432/acuity
#   REDIS_URL=redis://localhost:6379/0

services:
  postgres:
    image: postgres:16
    container_name: acuity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: acuity
      POSTGRES_PASSWORD: acuity
      POSTGRES_DB: acuity
    ports:
      - "5433:5432"
    volumes:
      - acuity_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acuity -d acuity"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: acuity-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - acuity_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  acuity_pgdata:
  acuity_redisdata:
