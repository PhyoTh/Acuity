# Local development infrastructure for DevLens.
# Prod uses Supabase (Postgres + Auth) and Render (services) instead.
#
#   docker compose up -d      # start Postgres + Redis
#   docker compose down       # stop (keeps the named volume / data)
#   docker compose down -v    # stop and wipe data
#
# Point backend/.env at these:
#   DATABASE_URL=postgresql+asyncpg://devlens:devlens@localhost:5432/devlens
#   REDIS_URL=redis://localhost:6379/0

services:
  postgres:
    image: postgres:16
    container_name: devlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: devlens
      POSTGRES_PASSWORD: devlens
      POSTGRES_DB: devlens
    ports:
      - "5432:5432"
    volumes:
      - devlens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devlens -d devlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: devlens-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - devlens_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  devlens_pgdata:
  devlens_redisdata:
