# Acuity production stack for a single VM (e.g. Oracle Cloud Always Free).
# Postgres + Auth stay on Supabase (external); this runs the backend + Redis + frontend behind
# Caddy, which terminates HTTPS and upgrades /ws/* to wss automatically.
#
#   cp deploy/.env.example deploy/.env      # then fill it in
#   docker compose --env-file deploy/.env -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
#
# NEXT_PUBLIC_* are baked into the frontend bundle at BUILD time (build args below), so changing
# one requires `--build` again, not just a restart.

services:
  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--maxmemory-policy", "noeviction"]
    volumes:
      - acuity_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: ./deploy/.env
    # Redis is internal to the compose network; override whatever's in the env file.
    environment:
      REDIS_URL: redis://redis:6379/0
    # Apply migrations to head, then start the gateway. Idempotent on every boot.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE}
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      ACUITY_DOMAIN: ${ACUITY_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - acuity_caddydata:/data
      - acuity_caddyconfig:/config
    depends_on:
      - backend
      - frontend

volumes:
  acuity_redisdata:
  acuity_caddydata:
  acuity_caddyconfig:
